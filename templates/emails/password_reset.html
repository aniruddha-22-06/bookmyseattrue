<!DOCTYPE html>
<html>
  <body style="font-family: Arial, sans-serif; line-height: 1.6; color: #1f2933;">
    <p>Hi {{ user.get_username }},</p>
    <p>We received a request to reset your BookMySeat password.</p>
    <p>
      <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
         style="display: inline-block; padding: 10px 16px; background: #2563eb; color: #ffffff; text-decoration: none; border-radius: 4px;">
        Reset Password
      </a>
    </p>
    <p>If you did not request this, you can ignore this email.</p>
    <p>Thanks,<br>BookMySeat Team</p>
  </body>
</html>
